services:
  worstassume:
    build: .
    image: worstassume:latest
    container_name: worstassume

    ports:
      - "3000:3000"

    volumes:
      # Persist the SQLite database between runs
      - worstassume-data:/data

      # Mount your AWS credentials (read-only) — comment out if using env vars below
      - "${HOME}/.aws:/root/.aws:ro"

    environment:
      # ─── AWS credentials (alternative to mounting ~/.aws) ───────────────────
      # Uncomment and fill if you prefer env-var credentials:
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      # AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}

      # ─── App config ─────────────────────────────────────────────────────────
      WORST_DB: /data/db.sqlite

    # Default: start the viz dashboard
    command: ["viz", "--host", "0.0.0.0", "--port", "3000", "--no-open-browser"]

    # Healthcheck — waits until the API is responsive
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/stats"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    restart: unless-stopped

volumes:
  worstassume-data:
    driver: local
